<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- title and logo -->
    <title>English Janala | Best Platfrom For Learning English</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">

    <!-- font awsome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- font integration -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- tailwind + daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- stylesheet -->
    <link rel="stylesheet" href="./style.css">

</head>

<body>

    <header>
        <div class="navbar bg-base-100 shadow-sm">
            <div class="navbar-start sm:flex flex-row-reverse justify-between w-full">
                <!-- w-full takes full width of its parent -->
                <div class="dropdown dropdown-end"> 
                    <!-- dropdown-end is a daisy ui class to open it from right -->
                    <div tabindex="0" role="button" class="btn btn-ghost lg:hidden">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M4 6h16M4 12h8m-8 6h16" />
                        </svg>
                    </div>
                    <ul tabindex="-1"
                        class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-40 p-2 shadow">
                        <li> <button class=""><i class="fa-solid fa-circle-question"></i> FAQ</button></li>
                        <li> <button class=""><i class="fa-solid fa-book-open"></i> Learn</button></li>
                        <li> <button class=""><i class="fa-solid fa-arrow-right-from-bracket"></i>Logout</button></li>
                    </ul>
                </div>
                <div>
                    <a href="" class="flex items-center gap-0.5">
                        <p class="font-bold">English</p>
                        <img src="./assets/logo.png" alt="logo">
                        <p class="font-bangla">জানালা</p>
                    </a>
                </div>
            </div>
            <div class="navbar-end hidden lg:flex">
                <ul class="menu menu-horizontal px-1 gap-4">
                    <li> <button class="btn btn-outline btn-primary"><i class="fa-solid fa-circle-question"></i>
                            FAQ</button></li>
                    <li> <button class="btn btn-outline btn-primary"><i class="fa-solid fa-book-open"></i>
                            Learn</button></li>
                    <li> <button class="btn btn-outline btn-primary"><i
                                class="fa-solid fa-arrow-right-from-bracket"></i></i> Logout</button></li>
                </ul>
            </div>

        </div>
    </header>

    <section class="flex flex-col-reverse md:flex-row justify-between gap-7 items-center w-11/12 mx-auto">
        <div class="content flex-1 text-center md:text-left">
            <h2 class="text-4xl pb-5"><span class="text-blue-400">English </span>is Easy !!</h2>
            <p class="font-bangla pb-4">আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান, আমাদের Interactive Lessons
                আপনাকে নিয়ে যাবে অন্য একটি Level এ</p>

            <input class="mb-4 text-[0.7rem]" type="text" placeholder="Enter your Name"><br>
            <input class="mb-4 text-[0.7rem]" type="password" placeholder="Enter your Passward"><br>
            <button class="btn btn-active btn-primary">Primary</button>
        </div>
        <div class="image flex-1">
            <img src="./assets/hero-student.png" alt="">
        </div>
    </section>

    <section class="mt-5 w-11/12 m-auto text-center">
        <h1 class=" font-bold text-4xl"><span class="text-blue-400">Let's </span>Learn Vocabularies</h1>
    </section>

</body>

</html>
